<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리 조 버킷리스트 아트 월</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nanum Pen Script', cursive;
            background-color: #d4b895;
            background-image: url('https://www.transparenttextures.com/patterns/cork-board.png');
            background-attachment: fixed;
            text-align: center;
            padding-bottom: 100px;
        }
        header {
            margin: 60px auto 40px auto;
            background-color: rgba(255, 255, 255, 0.9);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        h1 { color: #333; font-size: 2.8rem; margin-bottom: 10px; }
        .clearfix::after { content: ""; display: block; clear: both; }
        .gallery-container { width: 90%; max-width: 1200px; margin: 0 auto; }
        
        /* 공통 카드 스타일 */
        .card {
            float: left; width: 31.33%; margin: 1%;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            position: relative; /* 자식인 badge의 기준점 */
            transform: rotate(-3deg);
            transition: transform 0.3s ease, z-index 0s;
        }
        .card:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
        .card h2 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 10px; }
        .card p { color: #444; font-size: 1.3rem; text-align: left; line-height: 1.5; }
    </style>
</head>
<body>
    <header>
        <h1>🏖️ 2026 버킷리스트 아트 월 🏖️</h1>
        <p style="font-size: 1.5rem; color: #555;">우리 조의 꿈들을 코르크 보드에 붙였습니다!</p>
    </header>
    <main class="gallery-container clearfix">
        <!-- 팀원들의 코드가 들어갈 자리입니다 -->

    </main>
</body>
</html>
